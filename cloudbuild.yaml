# ============================================
# Google Cloud Build — CI/CD Pipeline
# GCP Project: redwindow-482406
# Builds Docker image and deploys to Cloud Run
# Includes: Lint, Test, Build, Deploy
# ============================================
steps:
  # Step 1: Install backend dependencies
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['ci', '--production=false']
    dir: 'backend'
    id: 'install-deps'

  # Step 2: Run linting (Code Quality gate)
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['run', 'lint']
    dir: 'backend'
    id: 'lint'
    waitFor: ['install-deps']

  # Step 3: Run tests with coverage (Testing gate)
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['run', 'test:ci']
    dir: 'backend'
    env:
      - 'NODE_ENV=test'
    id: 'test'
    waitFor: ['install-deps']

  # Step 4: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/redwindow-482406/syncsphere:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/redwindow-482406/syncsphere:latest'
      - '.'
    id: 'build'
    waitFor: ['lint', 'test']

  # Step 5: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/redwindow-482406/syncsphere:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/redwindow-482406/syncsphere:latest'

  # Step 6: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'syncsphere'
      - '--image=gcr.io/redwindow-482406/syncsphere:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=redwindow-482406:us-central1:syncsphere-db'
      - '--set-env-vars=NODE_ENV=production,FIREBASE_PROJECT_ID=redwindow-482406,VERTEX_AI_PROJECT=redwindow-482406,VERTEX_AI_LOCATION=us-central1,GCS_BUCKET_NAME=redwindow-482406-syncsphere-files,BQ_DATASET=syncsphere_analytics,DB_NAME=syncsphere,DB_USER=postgres,DB_PASSWORD=SyncSphere2026!,DB_SOCKET_PATH=/cloudsql/redwindow-482406:us-central1:syncsphere-db'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=300'

images:
  - 'gcr.io/redwindow-482406/syncsphere:$COMMIT_SHA'
  - 'gcr.io/redwindow-482406/syncsphere:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

